<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RailControl IoT</title>

<style>
:root { --bg:#121212; --card:#1e1e1e; --primary:#00d2ff; --secondary:#ff416c; --track:#333; --safe:#2ecc71; }
body { font-family:'Segoe UI'; background:var(--bg); color:white; display:flex; flex-direction:column; align-items:center; }

#map-container { width:850px; height:350px; position:relative; background:#080808; border-radius:15px; margin-bottom:20px; }

.track-line { stroke:var(--track); stroke-width:6; fill:none; }

.train { position:absolute; width:36px; height:22px; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:11px; }

#t1 { background:var(--primary); }
#t2 { background:var(--secondary); }

.dashboard { display:flex; gap:20px; width:850px; }

.panel { flex:1; background:var(--card); padding:15px; border-radius:12px; }

button { padding:10px; margin:5px; background:#333; color:white; border:none; }
</style>
</head>

<body>

<h2>🚉 IoT Train Control (Live)</h2>
<p id="iot-status">Blynk: Idle</p>

<div id="map-container">
<svg width="100%" height="100%">
<path d="M 75 125 L 275 175 M 75 225 L 275 175 M 275 175 L 575 175 M 575 175 L 775 125 M 575 175 L 775 225" class="track-line"/>
</svg>

<div id="t1" class="train">REAL</div>
<div id="t2" class="train">SIM</div>
</div>

<div class="dashboard">

<div class="panel">
<b>Train 1 (REAL)</b><br>
<button onclick="requestMove(0,1)">Forward</button>
<button onclick="requestMove(0,-1)">Reverse</button>
</div>

<div class="panel">
<b>Train 2 (SIM)</b><br>
<button onclick="requestMove(1,1)">Forward</button>
<button onclick="requestMove(1,-1)">Reverse</button>
</div>

</div>

<script>

// ===== BLYNK CONFIG =====
const TOKEN = "FdCdiQezGCb6F760TL2-bgTA2jk1Nn5V";
const SPEED = 200;

async function sendToESP(val){
    document.getElementById("iot-status").innerText = "Sending...";
    try{
        await fetch(`https://blynk.cloud/external/api/update?token=${TOKEN}&V1=${val}`);
        document.getElementById("iot-status").innerText = "Sent: "+val;
    }catch{
        document.getElementById("iot-status").innerText = "Error!";
    }
}

// ===== TRACK =====
const S = {
A:{x:75,y:125}, B:{x:75,y:225},
C:{x:275,y:175}, D:{x:575,y:175},
E:{x:775,y:125}, F:{x:775,y:225}
};

const trains = [
{ id:'t1', route:['A','C','D','E'], cur:0, x:S.A.x, y:S.A.y },
{ id:'t2', route:['B','C','D','F'], cur:0, x:S.B.x, y:S.B.y }
];

// ===== MOVE =====
function requestMove(i, dir){
    const t = trains[i];
    const next = t.cur + dir;
    if(next < 0 || next >= t.route.length) return;

    executeMove(i, next, dir);
}

function executeMove(i, next, dir){
    const t = trains[i];

    // REAL TRAIN CONTROL
    if(i===0){
        sendToESP(dir===1 ? SPEED : -SPEED);
    }

    const start = S[t.route[t.cur]];
    const end = S[t.route[next]];
    let dist = Math.hypot(end.x-start.x, end.y-start.y);
    let cur = 0;

    const anim = setInterval(()=>{
        cur+=3;
        let p = Math.min(cur/dist,1);

        t.x = start.x + (end.x-start.x)*p;
        t.y = start.y + (end.y-start.y)*p;

        updateUI();

        if(p>=1){
            clearInterval(anim);
            t.cur = next;

            if(i===0) sendToESP(0); // STOP motor
        }
    },30);
}

function updateUI(){
    trains.forEach(t=>{
        const el = document.getElementById(t.id);
        el.style.left = t.x+"px";
        el.style.top = t.y+"px";
    });
}

updateUI();

</script>
</body>
</html>
