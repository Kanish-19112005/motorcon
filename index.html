<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RailControl IoT</title>

<style>
:root { --bg:#121212; --card:#1e1e1e; --primary:#00d2ff; --secondary:#ff416c; --track:#333; }
body { font-family:'Segoe UI'; background:var(--bg); color:white; display:flex; flex-direction:column; align-items:center; }

#map-container { width:850px; height:350px; background:#080808; border-radius:15px; position:relative; margin:20px; }

.track-line { stroke:var(--track); stroke-width:6; fill:none; }

.train { position:absolute; width:36px; height:22px; border-radius:4px; display:flex; align-items:center; justify-content:center; }

#t1 { background:var(--primary); }
#t2 { background:var(--secondary); }

button { padding:10px; margin:5px; background:#333; color:white; border:none; }
</style>
</head>

<body>

<h2>🚉 Train IoT Control</h2>
<p id="status">Status: Idle</p>

<div id="map-container">
<svg width="100%" height="100%">
<path d="M 75 175 L 775 175" class="track-line"/>
</svg>

<div id="t1" class="train" style="left:75px; top:175px;">REAL</div>
<div id="t2" class="train" style="left:75px; top:200px;">SIM</div>
</div>

<button onclick="move(1)">Forward ➔</button>
<button onclick="move(-1)">⬅ Reverse</button>
<button onclick="move(0)">STOP</button>

<script>
const TOKEN = "YOUR_BLYNK_AUTH_TOKEN";

function send(val){
    fetch(`https://blynk.cloud/external/api/update?token=${TOKEN}&V1=${val}`)
    .then(()=>document.getElementById("status").innerText="Sent: "+val)
    .catch(()=>document.getElementById("status").innerText="Error");
}

function move(dir){
    if(dir===1) send(200);
    else if(dir===-1) send(-200);
    else send(0);
}
</script>

</body>
</html>
